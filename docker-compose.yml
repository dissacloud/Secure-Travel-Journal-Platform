name: secure-travel-journal

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-travel_journal}
      POSTGRES_USER: ${POSTGRES_USER:-travel_journal_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./application/backend/database/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - data

  backend:
    build:
      context: ./application/backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-travel_journal}
      DB_USER: ${POSTGRES_USER:-travel_journal_app}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      DB_SSL: "false"
      DB_POOL_MAX: 10
      DB_STARTUP_RETRIES: 15
      DB_STARTUP_RETRY_DELAY_MS: 1000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:5000/api/health/live').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - application
      - data

  frontend:
    build:
      context: ./application/frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8080/healthz >/dev/null || exit 1
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - application

volumes:
  postgres-data:

networks:
  application:
  data:
    internal: true
